name: my_pairing_workspace
publish_to: none

environment:
  sdk: ^3.11.1

dev_dependencies:
  melos: ^7.4.0

melos:
  packages:
    - packages/*

  sdkPath: .fvm/flutter_sdk

  scripts:
    get:
      run: melos exec -- fvm flutter pub get
      description: Run flutter pub get in all packages

    build_all:
      run: melos exec -- fvm flutter build apk
      description: Build all apps

    run:desktop:
      run: melos exec --scope=desktop_app -- fvm flutter run

    run:android:
      run: melos exec --scope=android_app -- fvm flutter run